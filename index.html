<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway Dashboard</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card { border: 1px solid #ddd; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; }
        button { background: #007bff; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid #eee; }
        .status-pending { color: orange; font-weight: bold; }
        .status-success { color: green; font-weight: bold; }
        .status-failed { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>💳 Merchant Dashboard</h1>

    <div class="card">
        <h2>⚡ Simulate Checkout</h2>
        <p>Click the button below to simulate a customer paying $500.</p>
        <button onclick="makePayment()">Pay $500.00</button>
        <p id="paymentResult" style="margin-top: 10px; font-size: 0.9rem; color: #666;"></p>
    </div>

    <div class="card">
        <h2>📊 Live Transactions</h2>
        <button onclick="fetchPayments()">🔄 Refresh List</button>
        <table>
            <thead>
                <tr>
                    <th>Payment ID</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="paymentTable">
                </tbody>
        </table>
    </div>

    <script>
        const API_URL = "http://localhost:8080/api/v1/payments";

        // 1. Function to Create a Payment (POST)
        async function makePayment() {
            const resultText = document.getElementById("paymentResult");
            resultText.innerText = "Processing...";
            
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        amount: 500.00, 
                        webhookUrl: "https://webhook.site/your-test-url" 
                    })
                });
                const data = await response.json();
                resultText.innerText = `✅ Request Sent! ID: ${data.id}`;
                fetchPayments(); // Auto-refresh list
            } catch (error) {
                resultText.innerText = "❌ Error: Is the Backend running?";
                console.error(error);
            }
        }

        // 2. Function to Get History (GET)
        async function fetchPayments() {
            try {
                const response = await fetch(API_URL);
                const payments = await response.json();
                
                const tableBody = document.getElementById("paymentTable");
                tableBody.innerHTML = ""; // Clear old data

                payments.forEach(p => {
                    const row = `<tr>
                        <td>${p.id}</td>
                        <td>$${p.amount}</td>
                        <td class="status-${p.status.toLowerCase()}">${p.status}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // Load data when page opens
        window.onload = fetchPayments;
    </script>
</body>
</html>
